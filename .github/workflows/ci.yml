name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: muslim-prayer-schedule

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary_ext: ""
          - os: macos-latest
            platform: macos-arm64
            binary_ext: ""
          - os: windows-latest
            platform: windows-x64
            binary_ext: ".exe"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Application
        run: bun run build:canary

      # This step renames your output so it's clear which OS it belongs to
      - name: Prepare Binary for Upload
        shell: bash
        run: |
          mkdir -p release_bin
          
          # 1. Find the bundled app. 
          # Electrobun usually puts things in 'out/canary/' or 'packages/'
          # We'll search for .app (Mac), .exe (Windows), or the binary (Linux)
          SEARCH_PATH="out" # Change to "packages" if Electrobun uses that
          
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # For Mac, we usually want to zip the .app bundle
            cd $SEARCH_PATH && zip -r ../release_bin/${{ env.APP_NAME }}-macos-arm64.zip *.app && cd ..
          else
            # For Windows/Linux, find the executable
            SOURCE_FILE=$(find $SEARCH_PATH -type f \( -name "*.exe" -o -executable \) | grep -v "node_modules" | head -n 1)
            cp "$SOURCE_FILE" release_bin/${{ env.APP_NAME }}-${{ matrix.platform }}${{ matrix.binary_ext }}
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform }}
          path: release_bin/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
          pattern: bin-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-binaries/*
          generate_release_notes: true
          draft: false
          prerelease: false