name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: muslim-prayer-schedule

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary_ext: ""
          - os: macos-latest
            platform: macos-arm64
            binary_ext: ""
          - os: windows-latest
            platform: windows-x64
            binary_ext: ".exe"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Application
        run: bun run build:canary

      # This step renames your output so it's clear which OS it belongs to
      - name: Prepare Binary for Upload
        shell: bash
        run: |
          mkdir -p release_bin
          
          echo "--- Searching for Build Output ---"
          # This finds files that look like apps/executables, excluding common junk folders
          # It looks for .exe (Windows), .app (Mac), or Linux binaries
          POTENTIAL_BIN=$(find . -maxdepth 4 -not -path '*/.*' -not -path './node_modules/*' -not -path './src/*' -type f \( -name "*.exe" -o -name "*.app" -o -executable \) | head -n 1)

          if [ -z "$POTENTIAL_BIN" ]; then
            echo "❌ Error: Could not find any build artifacts!"
            echo "Full Directory Tree for Debugging:"
            ls -R
            exit 1
          fi

          echo "✅ Found artifact at: $POTENTIAL_BIN"

          if [[ "$POTENTIAL_BIN" == *.app* ]] && [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Handle macOS .app folders by zipping them
            APP_FOLDER=$(echo "$POTENTIAL_BIN" | grep -o '.*\.app')
            zip -r "release_bin/${{ env.APP_NAME }}-macos.zip" "$APP_FOLDER"
          else
            # Handle Windows/Linux single files
            cp "$POTENTIAL_BIN" "release_bin/${{ env.APP_NAME }}-${{ matrix.platform }}${{ matrix.binary_ext }}"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform }}
          path: release_bin/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
          pattern: bin-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-binaries/*
          generate_release_notes: true
          draft: false
          prerelease: false