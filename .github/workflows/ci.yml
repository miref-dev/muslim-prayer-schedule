name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: muslim-prayer-schedule

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            binary_ext: ""
          - os: macos-latest
            platform: macos-arm64
            binary_ext: ""
          - os: windows-latest
            platform: windows-x64
            binary_ext: ".exe"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Application
        run: bun run build:canary

      # This step renames your output so it's clear which OS it belongs to
      - name: Prepare Binary for Upload
        shell: bash
        run: |
          mkdir -p release_bin
          
          echo "--- Searching for Build Output ---"
          
          # Detect the best candidate based on OS
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: Look for .exe files, ignoring node_modules
            POTENTIAL_BIN=$(find . -maxdepth 5 -name "*.exe" -not -path "*/node_modules/*" | head -n 1)
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS: Look for .app folders
            POTENTIAL_BIN=$(find . -maxdepth 5 -name "*.app" -not -path "*/node_modules/*" -type d | head -n 1)
          else
            # Linux: Look for files in 'out' or 'dist' that aren't web files (js/html/css)
            POTENTIAL_BIN=$(find . -maxdepth 5 -type f -not -path "*/node_modules/*" -not -name "*.js" -not -name "*.html" -not -name "*.css" -not -name "*.json" | grep -v "\.git" | head -n 1)
          fi

          if [ -z "$POTENTIAL_BIN" ]; then
            echo "❌ Error: Could not find any build artifacts!"
            echo "Printing directory tree to help find it:"
            ls -R | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/   /'
            exit 1
          fi

          echo "✅ Found artifact at: $POTENTIAL_BIN"

          if [[ "$POTENTIAL_BIN" == *.app ]]; then
            # macOS .app is a folder; zip it
            zip -r "release_bin/${{ env.APP_NAME }}-macos.zip" "$POTENTIAL_BIN"
          else
            # Windows/Linux files
            cp "$POTENTIAL_BIN" "release_bin/${{ env.APP_NAME }}-${{ matrix.platform }}${{ matrix.binary_ext }}"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform }}
          path: release_bin/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-binaries
          pattern: bin-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-binaries/*
          generate_release_notes: true
          draft: false
          prerelease: false